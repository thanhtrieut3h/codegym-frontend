<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS buoi 01</title>

    <link rel="stylesheet" href="css/demo.css">
    <style>
        * {
            /* tim tat ca cac phan trong tai lieu html */
        }
        /* ID Selector */
        #title {
            color: violet;
        }
        /* class Selector */
        .title {
            color: red;
        }
        /* class Selector */
        .small-title {
            color: blue;
        }
        /* HTML Selector(type selector) */
        h2 {
            color: green;
        }
    </style>
</head>
<body>
    <h1 id="title" class="title big-title sm-title"> Day the tieu to nhat </h1>
    <h2 id="title-2" class="title small-title"> Day la the H2</h2>
    <h2 class="my-title"> Day la the H2 thu 2</h2>
</body>
</html>
