<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form</title>
</head>
<body>
    <form method="" action="">
        <label for="username">Username</label>
        <input required type="text" id="username" placeholder="Nhap ten tai khoan">
        <br><br>
        <label for="password">Password</label>
        <input
           required
           type="password"
           id="password"
           placeholder="nhap mat khau"
           minlength="3"
           maxlength="8"
           name="password"
           class="my-input"
        >
        <br><br>
        <label for="email"> Email</label>
        <input  type="email" placeholder="nhap email" id="email">
        <br><br>
        <label for="number">Number</label>
        <input type="number" placeholder="Nhap so vao day" id="number">
        <br><br>
        <label>Nhap ngay thang</label>
        <input type="date" placeholder="Nhap ngay thang">
        <br><br>
        <label>Chon mau sac</label>
        <input type="color" placeholder="Chon mau sac">
        <br><br>
        <input placeholder="Nhap du lieu">
        <br><br>
        <label> Chon file du lieu</label>
        <input type="file" placeholder="chon file tu may tinh cua ban">
        <br><br>
        <label> Mo ta ban than</label>
        <textarea rows="10" placeholder="Thong tin ca nhan"></textarea>
        <br><br>
        <label>Chon khoa hoc</label>
        <select>
            <option value="html">HTML</option>
            <option value="css" selected>CSS</option>
            <option value="js"> ReactJS</option>
        </select>
        <br><br>
        <label for="agree">Dong y voi dieu khoan</label>
        <input type="checkbox" id="agree" checked>
        <p>Thong tin diem danh</p>
        <label>Nghi hoc</label>
        <input type="radio" name="diemdanh" value="nghihoc">
        <label> Co mat</label>
        <input type="radio" name="diemdanh" value="comat" checked>
        <label> Di Muon</label>
        <input type="radio" name="diemdanh" value="dimuon">
        <label> Co phep</label>
        <input type="radio" name="diemdanh" value="cophep">
        <br><br>
        <label for="url"> URL</label>
        <input type="url" placeholder="nhap URL" id="url">
        <br><br>
        <button type="submit"> Luu thong tin</button>
        <button type="button"> Nut bam thong thuong</button>
    </form>
</body>
</html>
